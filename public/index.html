<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skb</title>
    <link rel="stylesheet" href="./css/normolize.css">
    <link rel="stylesheet" href="./css/index.css">
    <script src="./index.js" defer></script>
</head>

<body>
    <header class="header">
        <a href="#" class="header__link"><img src="./img/logo.png" alt="лого" class="header__img"></a>
        <div class="autocomplete-wrapper">
            <input type="text" class="header__search" placeholder="Введите запрос">
            <ul class="suggestions" id="suggestionsList"></ul>
        </div>
    </header>
    <main class="main">
        <h1 class="main__title">Клиенты</h1>
        <div class="table-wrraper">
            <table class="main__table">
                <colgroup>
                    <col style="width: 10%;">
                    <col style="width: 30%;">
                    <col style="width: 20%;">
                    <col style="width: 20%;">
                    <col style="width: 20%;">
                    <col style="width: 20%;">
                </colgroup>
                <thead class="main__thead">
                    <tr class="main__row">
                        <th class="main__hcol">ID</th>
                        <th class="main__hcol">Фамилия, имя, отчество</th>
                        <th class="main__hcol">Дата и время создания</th>
                        <th class="main__hcol">Последнее изменение</th>
                        <th class="main__hcol">Контакты</th>
                        <th class="main__hcol">Действия</th>
                    </tr>
                </thead>
                <tbody class="main__container"></tbody>
            </table>
            <div class="main__load loading"></div>
        </div>
        <button class="main__btn"> <svg  width="23" height="16" viewBox="0 0 23 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14.5 8C16.71 8 18.5 6.21 18.5 4C18.5 1.79 16.71 0 14.5 0C12.29 0 10.5 1.79 10.5 4C10.5 6.21 12.29 8 14.5 8ZM5.5 6V3H3.5V6H0.5V8H3.5V11H5.5V8H8.5V6H5.5ZM14.5 10C11.83 10 6.5 11.34 6.5 14V16H22.5V14C22.5 11.34 17.17 10 14.5 10Z" fill="#9873FF"/>
          </svg>
           <span>Добавить клиента</span></button>
    </main>
</body>
</html>
